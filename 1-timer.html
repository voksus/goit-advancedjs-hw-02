<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <script type="module" crossorigin src="/goit-advancedjs-hw-02/assets/timer-DEAruJPS.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/iziToast.min-rkX_YU8T.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/iziToast-BFQQRvTW.css">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/timer-TCY5NlHH.css">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/styles-C2cEukJn.css">
  </head>
  <body>
    <main>
      <a class="back-link" href="javascript:history.back()">← Back</a>
      <div class="container">
        <input type="text" id="datetime-picker" />
        <button class="start-btn" type="button" data-start disabled>
          Start
        </button>
        <div class="timer">
          <div class="field">
            <span class="value" data-days>00</span>
            <span class="label">Days</span>
          </div>
          <div class="field">
            <span class="value" data-hours>00</span>
            <span class="label">Hours</span>
          </div>
          <div class="field">
            <span class="value" data-minutes>00</span>
            <span class="label">Minutes</span>
          </div>
          <div class="field">
            <span class="value" data-seconds>00</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
